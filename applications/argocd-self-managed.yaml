apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Multi-source: chart do Helm repo + values do Git repo
  sources:
    # Fonte 1: Helm chart oficial do Argo CD
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 5.31.0
      helm:
        releaseName: argocd
        valueFiles:
          # Referência ao arquivo do Git (via $values abaixo)
          - $values/cenario-2-migracao-manual-para-gitops/helm-values/base-values.yaml

    # Fonte 2: Seu Git repo com os values extraídos
    - repoURL: https://github.com/SEU-ORG/SEU-REPO.git  # <- substituir pelo repo real
      targetRevision: HEAD
      ref: values  # alias usado no valueFiles acima como $values

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
